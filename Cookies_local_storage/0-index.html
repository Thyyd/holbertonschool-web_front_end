<!doctype html>
<html lang="fr">
    <head>
		<meta charset="utf-8"/>
	    <title>Coockies Test</title>
	</head>
    <body>
        <h1>Login to the website</h1>
        <input type="text" name="Firstname" id="firstname" placeholder="Firstname">
        <input type="text" name="Email" id="email" placeholder="Email">
        <button class="setCookies" onclick="setCookies()">Log me in</button>
        <h2>Cookies</h2>
        <button class="showCookies" onclick="showCookies()">Show the cookies</button>

        <script>
            // Fonction setCookies
            function setCookies()
            {
                const firstname = document.getElementById("firstname").value;
                const email = document.getElementById("email").value;

                // Ajoute les cookies firtsname et email
                document.cookie = "firstname=" + firstname;
                document.cookie = "email=" + email;
            }

            // Fonction showCookies
            function showCookies()
            {
                const p = document.createElement("p");
                p.innerHTML = "Cookies: " + document.cookie;
                document.body.appendChild(p);
            }
        </script>
    </body>
</html>
